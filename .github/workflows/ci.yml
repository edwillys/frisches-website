name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: false
          lfs: true

      - name: Load SSH deploy key for private submodule
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY_ASSETS }}

      - name: Fetch private submodule via SSH
        run: |
          git config --global url."git@github.com:".insteadOf "https://github.com/"
          git submodule update --init --recursive

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers and system dependencies
        run: npx playwright install --with-deps

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run unit tests (with coverage)
        run: npm run test:coverage --

      - name: Build
        run: npm run build

      - name: Run E2E tests
        run: npm run test:e2e --
        env:
          CI: true

      - name: Upload Playwright E2E artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-e2e-artifacts
          if-no-files-found: ignore
          retention-days: 14
          path: |
            test-results/**
            playwright-report/**

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage/coverage-final.json,./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          token: ${{ secrets.CODECOV_TOKEN }}
