version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      vite-ecosystem:
        patterns:
          - vite
          - '@vitejs/*'
          - 'vite-*'
      primevue:
        patterns:
          - primevue
          - '@primevue/*'
          - primeicons
      testing:
        patterns:
          - vitest
          - '@vitest/*'
          - '@playwright/*'
          - '@vue/test-utils'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
