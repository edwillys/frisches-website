<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frisches - Official Website</title>
    <meta
      name="description"
      content="Frisches – Rock band from Munich. Powerful beats, punchy bass lines, gritty guitar riffs and incisive lyrics."
    />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Frisches – Official Website" />
    <meta
      property="og:description"
      content="Frisches – Rock band from Munich. Powerful beats, punchy bass lines, gritty guitar riffs and incisive lyrics."
    />
    <meta property="og:url" content="https://frisches.band/" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Frisches – Official Website" />
    <meta name="twitter:description" content="Frisches – Rock band from Munich." />

    <!-- Umami analytics (no-op when VITE_UMAMI_WEBSITE_ID is not set) -->
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="%VITE_UMAMI_WEBSITE_ID%"
    ></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
